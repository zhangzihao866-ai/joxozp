<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOXOZP 管理后台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #333; display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #111; color: #fff; padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column; }
.sidebar .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; padding: 0 20px 24px; border-bottom: 1px solid #333; margin-bottom: 12px; }
.sidebar .logo span { color: #d01616; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: #999; font-size: 0.85rem; cursor: pointer; transition: all .15s; }
.sidebar nav a:hover, .sidebar nav a.active { color: #fff; background: #222; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 10px; padding: 14px 24px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-wrap: wrap; }
.toolbar h2 { font-size: 1.1rem; flex: 1; }
.btn { padding: 8px 18px; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-dark { background: #111; color: #fff; } .btn-dark:hover { background: #333; }
.btn-red { background: #d01616; color: #fff; } .btn-red:hover { background: #b01212; }
.btn-green { background: #0a8043; color: #fff; } .btn-green:hover { background: #086b36; }
.btn-outline { background: #fff; border: 1px solid #ddd; } .btn-outline:hover { background: #f5f5f5; }
.btn-sm { padding: 5px 12px; font-size: 0.78rem; }
.content { flex: 1; padding: 20px 24px; overflow-y: auto; }
.status { font-size: 0.82rem; padding: 8px 14px; border-radius: 6px; }
.status.ok { background: #f0fdf4; color: #0a8043; border: 1px solid #dcfce7; }
.status.err { background: #fef2f2; color: #d01616; border: 1px solid #fecaca; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
th { background: #f8f9fa; color: #555; padding: 10px 12px; font-size: 0.78rem; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e5e5; }
td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.83rem; vertical-align: middle; }
tr:hover { background: #fafbfc; }
td img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; border: 1px solid #eee; }
input, select, textarea { padding: 7px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; font-family: inherit; }
input:focus, select:focus { outline: none; border-color: #111; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 12px; padding: 28px; width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal h3 { margin-bottom: 20px; font-size: 1.1rem; }
.modal label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; margin-top: 12px; color: #555; }
.modal .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
.hidden { display: none !important; }
/* Upload zone */
.upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all .2s; background: #fafafa; margin-top: 6px; }
.upload-zone:hover, .upload-zone.drag { border-color: #111; background: #f0f0f0; }
.upload-zone input { display: none; }
.upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
.upload-zone p { font-size: 0.85rem; color: #888; }
.upload-zone .hint { font-size: 0.72rem; color: #aaa; }
.upload-progress { margin-top: 8px; display: none; }
.upload-progress .bar { height: 4px; background: #e5e5e5; border-radius: 2px; overflow: hidden; }
.upload-progress .bar-fill { height: 100%; background: #0a8043; width: 0; transition: width .3s; }
/* Image picker */
.img-picker { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.img-picker input { flex: 1; min-width: 200px; }
.img-picker .current { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; border: 1px solid #eee; }
/* Deploy log */
.deploy-log { background: #1a1a2e; color: #0f0; padding: 12px 16px; border-radius: 6px; font-family: monospace; font-size: 0.78rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 12px; }
@media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; padding: 10px; } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">JOXO<span>ZP</span></div>
  <nav>
    <a class="active" onclick="switchTab('products')">📦 商品管理</a>
    <a onclick="switchTab('images')">🖼️ 图片管理</a>
  </nav>
  <div style="margin-top:auto;padding:20px;border-top:1px solid #333">
    <button class="btn btn-green" style="width:100%;margin-bottom:8px" onclick="saveToServer()">💾 保存到服务器</button>
    <button class="btn btn-red" style="width:100%" onclick="doDeploy()">🚀 一键发布上线</button>
    <div style="margin-top:8px;font-size:0.7rem;color:#666;text-align:center">先保存 → 再发布</div>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <h2 id="page-title">📦 商品管理</h2>
    <span class="status ok" id="status">加载中...</span>
    <button class="btn btn-dark" id="btn-add" onclick="openModal()">+ 添加商品</button>
    <button class="btn btn-outline" onclick="loadProducts()">🔄 刷新</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
const API = '';

let products = [];
let currentIdx = null;

async function api(path, opts={}) {
  const resp = await fetch(API + path, opts);
  return resp.json();
}

async function loadProducts() {
  try {
    products = await api('/api/products');
    setStatus(`已加载 ${products.length} 件商品`, true);
    renderTable();
  } catch(e) {
    setStatus('加载失败 — 请确认已启动 server.js', false);
  }
}

function setStatus(msg, ok) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + (ok ? 'ok' : 'err');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmoney(n) { return Number(n).toLocaleString('en-US',{minimumFractionDigits:2}); }

// ============ TABLE ============
function renderTable() {
  const tbody = products.map((p, i) => `
    <tr>
      <td><img src="../${p.img}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect fill=%22%23eee%22 width=%2248%22 height=%2248%22/></svg>'"></td>
      <td><strong>${esc(p.brand)}</strong></td>
      <td>${esc(p.name).substring(0,45)}${p.name&&p.name.length>45?'...':''}</td>
      <td>$${fmoney(p.price)}</td>
      <td style="font-size:0.8rem;color:#999">${p.original ? '$'+fmoney(p.original) : '-'}</td>
      <td style="color:#d01616;font-weight:600">${esc(p.discount||'')}</td>
      <td>${p.cat||'watches'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="editProduct(${i})">✏️</button>
        <button class="btn btn-outline btn-sm" style="color:#d01616" onclick="if(confirm('删除?')){products.splice(${i},1);renderTable()}">🗑</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('content').innerHTML = `
    <table>
      <thead><tr><th style="width:60px">图</th><th>品牌</th><th>商品名</th><th>价格</th><th>原价</th><th>折扣</th><th>分类</th><th style="width:100px">操作</th></tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

// ============ MODAL ============
async function openModal(idx) {
  currentIdx = idx;
  const isEdit = idx !== undefined && idx !== null;
  const p = isEdit ? products[idx] : { id: Math.max(...products.map(x=>x.id),0)+1, brand:'', name:'', price:0, original:0, discount:'', coupon:false, img:'assets/images/rolex/submariner.jpg', cat:'watches', link:'' };
  
  // Load image list for picker
  let imgList = [];
  try { imgList = await api('/api/images'); } catch(e) {}

  document.getElementById('modal').innerHTML = `
    <h3>${isEdit?'编辑':'添加'}商品</h3>
    <div class="row">
      <div><label>品牌 *</label><input id="f-brand" value="${esc(p.brand)}" placeholder="ROLEX"></div>
      <div><label>分类</label><select id="f-cat">${['watches','handbags','fragrances','jewelry','sunglasses','shoes'].map(c=>`<option value="${c}" ${p.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <label>商品名 *</label><input id="f-name" value="${esc(p.name)}" placeholder="商品名称...">
    <div class="row">
      <div><label>售价 ($)</label><input id="f-price" type="number" step="0.01" value="${p.price}"></div>
      <div><label>原价 ($)</label><input id="f-original" type="number" step="0.01" value="${p.original||''}"></div>
    </div>
    <div class="row">
      <div><label>折扣</label><input id="f-discount" value="${esc(p.discount)}" placeholder="20% OFF"></div>
      <div><label>优惠券</label><select id="f-coupon"><option value="1" ${p.coupon?'selected':''}>有</option><option value="0" ${!p.coupon?'selected':''}>无</option></select></div>
    </div>
    <label>图片</label>
    <div class="img-picker">
      <img id="f-preview" class="current" src="../${p.img}" onerror="this.style.display='none'">
      <input id="f-img" value="${esc(p.img)}" placeholder="assets/images/xxx.jpg" oninput="updatePreview()">
    </div>
    <select id="f-img-select" onchange="selectImg(this.value)" style="margin-top:4px;width:100%">
      <option value="">— 从已有图片选择 —</option>
      ${imgList.map(im=>`<option value="${im.path}" ${p.img===im.path?'selected':''}>${im.path} (${(im.size/1024).toFixed(0)}KB)</option>`).join('')}
    </select>
    <div style="margin-top:8px">
      <label class="upload-zone" id="upload-zone" style="padding:16px">
        <div class="icon">📁</div>
        <p>拖拽图片到这里 或 点击上传</p>
        <p class="hint">支持 JPG / PNG / WebP / GIF</p>
        <input type="file" id="file-input" accept="image/*" onchange="uploadImage(event)">
      </label>
      <div class="upload-progress" id="upload-progress">
        <div class="bar"><div class="bar-fill" id="upload-fill"></div></div>
        <p style="font-size:0.75rem;color:#888;margin-top:4px" id="upload-msg"></p>
      </div>
    </div>
    <label>官方链接</label><input id="f-link" value="${esc(p.link||'')}" placeholder="https://www.rolex.com/watches/...">
    <div class="btns">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-dark" onclick="saveProduct()">${isEdit?'更新':'添加'}</button>
    </div>`;

  // Drag & drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) doUpload(file);
  });
  zone.addEventListener('click', () => document.getElementById('file-input').click());

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function updatePreview() {
  const src = document.getElementById('f-img').value;
  const prev = document.getElementById('f-preview');
  prev.src = '../' + src;
  prev.style.display = 'block';
  prev.onerror = function(){ this.style.display = 'none'; };
}

function selectImg(path) {
  if (!path) return;
  document.getElementById('f-img').value = path;
  updatePreview();
}

async function uploadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  doUpload(file);
}

async function doUpload(file) {
  const prog = document.getElementById('upload-progress');
  const fill = document.getElementById('upload-fill');
  const msg = document.getElementById('upload-msg');
  prog.style.display = 'block';
  fill.style.width = '30%';
  msg.textContent = '上传中...';

  const fd = new FormData();
  fd.append('file', file);

  try {
    const resp = await fetch(API + '/api/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    fill.style.width = '100%';
    msg.textContent = '✅ 上传成功!';
    if (data.path) {
      document.getElementById('f-img').value = data.path;
      updatePreview();
      // Refresh image select
      const sel = document.getElementById('f-img-select');
      if (sel) {
        const opt = document.createElement('option');
        opt.value = data.path; opt.textContent = data.path + ' (新)'; opt.selected = true;
        sel.insertBefore(opt, sel.firstChild);
      }
    }
  } catch(e) {
    msg.textContent = '❌ 上传失败: ' + e.message;
  }
  setTimeout(() => { prog.style.display = 'none'; }, 2000);
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

function saveProduct() {
  const get = id => document.getElementById(id)?.value || '';
  const data = {
    id: currentIdx != null ? products[currentIdx].id : Math.max(...products.map(x=>x.id),0)+1,
    brand: get('f-brand'),
    name: get('f-name'),
    price: parseFloat(get('f-price'))||0,
    original: parseFloat(get('f-original'))||0,
    discount: get('f-discount'),
    coupon: get('f-coupon') === '1',
    img: get('f-img') || 'assets/images/rolex/submariner.jpg',
    cat: get('f-cat') || 'watches',
    link: get('f-link')
  };
  if (!data.brand || !data.name) { alert('品牌和商品名必填'); return; }
  
  if (currentIdx != null) products[currentIdx] = data;
  else products.push(data);
  
  renderTable();
  closeModal();
  setStatus(`已${currentIdx!=null?'更新':'添加'}: ${data.brand} — 别忘了点 💾 保存`, true);
}

function editProduct(idx) { openModal(idx); }

// ============ SAVE TO SERVER ============
async function saveToServer() {
  setStatus('保存中...', true);
  try {
    const resp = await api('/api/products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(products)
    });
    if (resp.ok) {
      setStatus(`✅ 已保存 ${resp.count} 件商品到 data.js！现在可以点 🚀 发布了`, true);
    } else {
      setStatus('保存失败: ' + (resp.error||'未知错误'), false);
    }
  } catch(e) {
    setStatus('保存失败: ' + e.message, false);
  }
}

// ============ DEPLOY ============
async function doDeploy() {
  if (!confirm('确认发布到 https://joxozp.netlify.app ?')) return;
  setStatus('🚀 发布中...', true);
  
  // First save
  await saveToServer();
  
  try {
    const resp = await api('/api/deploy', { method: 'POST' });
    if (resp.ok) {
      setStatus('✅ 发布成功！https://joxozp.netlify.app', true);
      document.getElementById('content').innerHTML += '<div class="deploy-log">' + esc(resp.output||'Done!') + '</div>';
    } else {
      setStatus('发布失败: ' + (resp.error||'未知错误'), false);
    }
  } catch(e) {
    setStatus('发布失败: ' + e.message, false);
  }
}

// ============ IMAGES TAB ============
async function renderImagesTab() {
  let imgs = [];
  try { imgs = await api('/api/images'); } catch(e) {}

  // Count usage
  const usage = {};
  products.forEach(p => { usage[p.img] = (usage[p.img]||0) + 1; });

  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px">
      ${imgs.map(img => `
        <div style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);padding:10px;text-align:center">
          <img src="../${img.path}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px" onerror="this.style.background='#eee'">
          <div style="font-size:0.7rem;color:#999;margin-top:6px;word-break:break-all">${img.path}</div>
          <div style="font-size:0.7rem;color:#d01616">${usage[img.path]||0} 件商品</div>
          <div style="font-size:0.65rem;color:#aaa">${(img.size/1024).toFixed(0)}KB</div>
        </div>
      `).join('')}
    </div>
    <label class="upload-zone" id="img-upload-zone" style="margin-top:24px;padding:30px">
      <div class="icon">📁</div>
      <p>拖拽图片上传到服务器</p>
      <p class="hint">JPG / PNG / WebP / GIF</p>
      <input type="file" id="img-file-input" accept="image/*" onchange="uploadStandalone(event)">
    </label>
    <div class="upload-progress" id="img-progress" style="margin-top:8px">
      <div class="bar"><div class="bar-fill" id="img-fill"></div></div>
      <p style="font-size:0.75rem;color:#888;margin-top:4px" id="img-msg"></p>
    </div>`;

  const zone = document.getElementById('img-upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) doStandaloneUpload(file);
  });
}

async function uploadStandalone(e) {
  const file = e.target.files[0];
  if (!file) return;
  doStandaloneUpload(file);
}

async function doStandaloneUpload(file) {
  const prog = document.getElementById('img-progress');
  const fill = document.getElementById('img-fill');
  const msg = document.getElementById('img-msg');
  prog.style.display = 'block';
  fill.style.width = '30%';
  msg.textContent = '上传中...';

  const fd = new FormData();
  fd.append('file', file);

  try {
    const resp = await fetch(API + '/api/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    fill.style.width = '100%';
    msg.textContent = '✅ 上传成功! 路径: ' + data.path;
    setTimeout(() => renderImagesTab(), 1000);
  } catch(e) {
    msg.textContent = '❌ 上传失败';
  }
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`.sidebar nav a:contains('${tab==='products'?'商品':'图片'}')`).classList.add('active');
  document.getElementById('btn-add').style.display = tab === 'products' ? '' : 'none';
  if (tab === 'products') { document.getElementById('page-title').textContent = '📦 商品管理'; renderTable(); }
  else { document.getElementById('page-title').textContent = '🖼️ 图片管理'; renderImagesTab(); }
}

// Init
loadProducts();
</script>
</body>
</html>
