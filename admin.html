<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOXOZP 商品管理后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  h1 span { font-size: 0.8rem; background: #d01616; color: #fff; padding: 4px 10px; border-radius: 4px; }
  .toolbar { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; align-items: center; }
  .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-add { background: #111; color: #fff; }
  .btn-add:hover { background: #333; }
  .btn-save { background: #0a8043; color: #fff; }
  .btn-save:hover { background: #086b36; }
  .btn-deploy { background: #d01616; color: #fff; }
  .btn-deploy:hover { background: #b01212; }
  .btn-outline { background: #fff; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f0f0f0; }
  .status { font-size: 0.85rem; color: #666; padding: 8px 14px; background: #fff; border-radius: 6px; border: 1px solid #e0e0e0; }
  .status.success { color: #0a8043; border-color: #0a8043; background: #f0fdf4; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-top: 12px; }
  th { background: #111; color: #fff; padding: 10px 12px; font-size: 0.8rem; text-align: left; font-weight: 600; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
  tr:hover { background: #fafafa; }
  input, select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.82rem; font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: #111; }
  input.num { width: 90px; text-align: right; }
  input.short { width: 110px; }
  td.actions { white-space: nowrap; }
  td.actions button { padding: 4px 10px; border: none; border-radius: 4px; font-size: 0.75rem; cursor: pointer; margin-right: 4px; }
  .btn-del { background: #fee; color: #d01616; }
  .btn-del:hover { background: #fdd; }
  .btn-dup { background: #eef; color: #336; }
  .btn-dup:hover { background: #dde; }
  .drag-handle { cursor: grab; color: #aaa; font-size: 1.1rem; padding: 0 4px; user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  .count { color: #999; font-size: 0.85rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 460px; max-width: 95vw; box-shadow: 0 12px 40px rgba(0,0,0,.15); }
  .modal h2 { margin-bottom: 16px; font-size: 1.1rem; }
  .modal label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 3px; margin-top: 10px; color: #555; }
  .modal input, .modal select { padding: 8px 10px; font-size: 0.85rem; }
  .modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .hidden { display: none !important; }
  @media (max-width: 768px) { table { font-size: 0.75rem; } td, th { padding: 6px; } }
</style>
</head>
<body>
<div class="container">
  <h1>JOXOZP <span>商品管理</span></h1>
  <div class="count" id="count">0 件商品</div>
  <div class="toolbar">
    <button class="btn btn-add" onclick="openModal()">+ 添加商品</button>
    <button class="btn btn-save" onclick="saveAll()">💾 保存</button>
    <button class="btn btn-deploy" onclick="deploy()">🚀 一键发布上线</button>
    <button class="btn btn-outline" onclick="exportJSON()">📋 导出备份</button>
    <span class="status" id="status">就绪</span>
  </div>
  <table id="table">
    <thead>
      <tr>
        <th style="width:30px"></th>
        <th>品牌</th>
        <th>商品名</th>
        <th>售价($)</th>
        <th>原价($)</th>
        <th>折扣标签</th>
        <th>券</th>
        <th>分类</th>
        <th>图片</th>
        <th style="width:100px">操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const DATA_FILE = '../js/data.js';

let products = [];

function loadData() {
  fetch(DATA_FILE).then(r => r.text()).then(txt => {
    const match = txt.match(/const products = (\[[\s\S]*?\]);/);
    if (match) {
      products = eval(match[1]);
      render();
    }
  }).catch(err => {
    setStatus('未找到 data.js，请把此文件放在 joxozp/admin 目录下', false);
  });
}

function render() {
  document.getElementById('count').textContent = products.length + ' 件商品';
  document.getElementById('tbody').innerHTML = products.map((p, i) => `
    <tr data-idx="${i}">
      <td class="drag-handle" draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="drop(event,${i})">☰</td>
      <td><input value="${esc(p.brand)}" onchange="update(${i},'brand',this.value)"></td>
      <td><input value="${esc(p.name)}" onchange="update(${i},'name',this.value)"></td>
      <td><input class="num" type="number" step="0.01" value="${p.price}" onchange="update(${i},'price',parseFloat(this.value)||0)"></td>
      <td><input class="num" type="number" step="0.01" value="${p.original||''}" onchange="update(${i},'original',parseFloat(this.value)||0)"></td>
      <td><input class="short" value="${esc(p.discount)}" onchange="update(${i},'discount',this.value)"></td>
      <td><select onchange="update(${i},'coupon',this.value==='true')"><option value="true" ${p.coupon?'selected':''}>有</option><option value="false" ${!p.coupon?'selected':''}>无</option></select></td>
      <td><select onchange="update(${i},'cat',this.value)">
        ${['watches','handbags','fragrances','jewelry','sunglasses','shoes'].map(c => `<option value="${c}" ${p.cat===c?'selected':''}>${c}</option>`).join('')}
      </select></td>
      <td><input value="${esc(p.img)}" onchange="update(${i},'img',this.value)"></td>
      <td class="actions">
        <button class="btn-dup" onclick="duplicate(${i})">复制</button>
        <button class="btn-del" onclick="remove(${i})">删除</button>
      </td>
    </tr>
  `).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function update(idx, key, val) { products[idx][key] = val; }

function remove(idx) { if (confirm('确认删除 ' + products[idx].brand + '？')) { products.splice(idx, 1); render(); } }

function duplicate(idx) {
  const p = JSON.parse(JSON.stringify(products[idx]));
  p.id = Math.max(...products.map(x => x.id)) + 1;
  products.splice(idx + 1, 0, p);
  render();
}

// Drag & drop
let dragIdx = null;
function dragStart(e, idx) { dragIdx = idx; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); }
function drop(e, idx) {
  e.preventDefault();
  if (dragIdx !== null && dragIdx !== idx) {
    const item = products.splice(dragIdx, 1)[0];
    products.splice(idx, 0, item);
    render();
  }
  dragIdx = null;
}

function setStatus(msg, ok) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (ok ? ' success' : '');
}

function saveAll() {
  const lines = products.map(p => {
    const coupon = p.coupon ? 'true' : 'false';
    const original = p.original ? p.original : '0';
    const discount = p.discount ? `'${p.discount}'` : "''";
    const couponStr = p.coupon ? 'true' : 'false';
    return `  { id:${p.id}, brand:'${p.brand.replace(/'/g,"\\'")}', name:'${p.name.replace(/'/g,"\\'")}', price:${p.price}, original:${original}, discount:${discount}, coupon:${couponStr}, img:'${p.img.replace(/'/g,"\\'")}', cat:'${p.cat}' }`;
  });
  const js = `// JOXOZP Product Data\nconst products = [\n${lines.join(',\n')}\n];\n`;
  
  // Save via blob download
  const blob = new Blob([js], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.js';
  a.click();
  setStatus('已导出 data.js，请替换 joxozp/js/data.js 文件', true);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'joxozp_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setStatus('备份已下载', true);
}

function deploy() {
  saveAll();
  setStatus('请先将下载的 data.js 替换到 joxozp/js/data.js，然后双击 一键发布.bat', true);
}

// ---- Add Modal ----
function openModal(p) {
  let html = '<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h2>添加商品</h2>';
  const fields = [
    { key: 'brand', label: '品牌', type: 'text' },
    { key: 'name', label: '商品名', type: 'text' },
    { key: 'price', label: '售价 ($)', type: 'number', step: '0.01' },
    { key: 'original', label: '原价 ($)', type: 'number', step: '0.01' },
    { key: 'discount', label: '折扣标签', type: 'text', placeholder: '如: 20% OFF' },
    { key: 'img', label: '图片路径', type: 'text', placeholder: 'assets/images/xxx.jpg' },
    { key: 'cat', label: '分类', type: 'select', options: ['watches','handbags','fragrances','jewelry','sunglasses','shoes'] },
  ];
  fields.forEach(f => {
    html += `<label>${f.label}</label>`;
    if (f.type === 'select') {
      html += `<select id="field-${f.key}">${f.options.map(o => `<option>${o}</option>`).join('')}</select>`;
    } else {
      html += `<input id="field-${f.key}" type="${f.type}"${f.step?' step="'+f.step+'"':''}${f.placeholder?' placeholder="'+f.placeholder+'"':''}>`;
    }
  });
  html += '<label><input type="checkbox" id="field-coupon" checked> 有优惠券</label>';
  html += '<div class="btns"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-add" onclick="doAdd()">添加</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { const m = document.getElementById('modal-overlay'); if (m) m.remove(); }

function doAdd() {
  const get = id => document.getElementById(id)?.value || '';
  const p = {
    id: Math.max(...products.map(x => x.id), 0) + 1,
    brand: get('field-brand'),
    name: get('field-name'),
    price: parseFloat(get('field-price')) || 0,
    original: parseFloat(get('field-original')) || 0,
    discount: get('field-discount'),
    coupon: document.getElementById('field-coupon')?.checked || false,
    img: get('field-img') || 'assets/images/hero-banner.jpg',
    cat: get('field-cat') || 'watches'
  };
  if (!p.brand || !p.name) { alert('品牌和商品名必填'); return; }
  products.push(p);
  render();
  closeModal();
  setStatus('已添加: ' + p.brand, true);
}

loadData();
</script>
</body>
</html>
